<link rel="stylesheet" href="assets/style.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>

    darkMode: 'class',
    theme: {
      extend: {
        colors: {

<body class="bg-cream dark:bg-navy-900 text-ink dark:text-cream font-body antialiased">

  <div class="relative max-w-container mx-auto px-5 sm:px-10">
    <div class="font-mono text-[11px] tracking-[.16em] uppercase text-mute mb-5"><a href="index.html" class="hover:text-orange-500" data-i18n="c.home">Home</a> / <span class="text-orange-500" data-i18n="partners.crumb"></span></div>

</section>

        <p class="text-lg text-mute dark:text-cream/60 leading-relaxed mb-6" data-i18n="p1.fullBody"></p>
        <div class="flex flex-wrap gap-2">
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p1.s1"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p1.s2"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p1.s3"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p1.s4"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p1.s5"></span></span>

        <div class="flex flex-wrap gap-2">
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p2.s1"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p2.s2"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p2.s3"></span></span><span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-white dark:bg-navy-700 border border-ink/10 dark:border-white/10 text-xs font-medium"><span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span><span data-i18n="p2.s4"></span></span>

      <div class="img-ph aspect-[4/3] rounded-2xl"><span class="ph-label">EQUITI · brand asset</span></div>

<section class="py-12 md:py-16 bg-navy-800 dark:bg-navy-900 text-cream">
  <div class="max-w-container mx-auto px-5 sm:px-10 flex flex-wrap justify-between items-center gap-6">
    <div>
      <h3 class="font-display font-medium text-2xl md:text-3xl text-white mb-2" data-i18n="partners.findPartner"></h3>
      <p class="text-cream/70 max-w-[520px]" data-i18n="partners.findPartnerSub"></p>

    <a href="contact.html" class="btn-link inline-flex items-center gap-2.5 px-6 py-3.5 rounded-full bg-orange-500 hover:bg-orange-600 text-white font-semibold text-sm transition"><span data-i18n="partners.cta"></span><span class="btn-arrow">→</span></a>
